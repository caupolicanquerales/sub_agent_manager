spring.application.name=sub_agent_manager
server.port= 8085
spring.main.web-application-type= reactive
spring.ai.openai.api-key= ${OPENAI_API_KEY}
spring.ai.openai.embedding.model= text-embedding-3-large
spring.ai.openai.responses.options.model= gpt-5.1
spring.ai.openai.chat.enabled= true
spring.ai.openai.chat.options.model= gpt-5.1
spring.ai.openai.chat.options.temperature=1.0
event.name-chat= new-message

app.frontend.url= http://localhost:4200

logging.level.org.springframework.http.codec=DEBUG
spring.main.allow-bean-definition-overriding=true
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=DEBUG

url-html= ${URL_HTML:http://localhost:8087/sub-html-agent-chat/chat-stream}
url-improver= ${URL_IMPROVER:http://localhost:8088/sub-improve-agent-chat/chat-stream}
url-image= ${URL_IMAGE:http://localhost:8086/sub-agent-image/stream-image}
url-general-chat= ${URL_GENERAL_CHAT:http://localhost:8089/sub-agent-general-chat/chat-stream}

# Agent types: WEBFLUX (Spring WebFlux, ServerSentEvent<DataMessage>) or SPRING_MVC (SseEmitter, raw JSON string)
agent-type-html= WEBFLUX
agent-type-improver= WEBFLUX
agent-type-general-chat= WEBFLUX
agent-type-image= SPRING_MVC

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
